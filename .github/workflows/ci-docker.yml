name: Docker CI

on:
  pull_request:
    branches: ['main', 'release/**']
    paths:
      ['Dockerfile', 'bin/**', 'config/**', '.github/workflows/ci-docker.yml']

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: blinklabs-io

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        arch: [amd64, arm64]
        image: [cardano-node, cardano-tracer, cardano-submit-api]
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 https://github.com/actions/checkout/releases/tag/v6.0.2

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0 https://github.com/docker/setup-buildx-action/releases/tag/v4.1.0

      - id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0 https://github.com/docker/metadata-action/releases/tag/v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.image }}
          flavor: |
            latest=false
            suffix=-${{ matrix.arch == 'arm64' && 'arm64v8' || 'amd64' }}

      - name: Build Docker image
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0 https://github.com/docker/build-push-action/releases/tag/v7.2.0
        with:
          context: .
          push: false
          target: ${{ matrix.image }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=buildkit-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=buildkit-${{ matrix.arch }}
